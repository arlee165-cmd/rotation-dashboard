<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>🍴 우리 회사 맛집지도 (교대역)</title>
<style>
  @import url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@latest/dist/web/static/pretendard.min.css");

  :root {
    --ink: #18181b;
    --muted: #71717a;
    --faint: #a1a1aa;
    --line: #f0f0f2;
    --line-2: #e7e7ea;
    --surface: #fafafa;
    --radius: 16px;
    --shadow-sm: 0 1px 2px rgba(0,0,0,.04);
    --shadow: 0 8px 28px rgba(0,0,0,.07);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
    background: #fff;
    color: var(--ink);
    display: flex;
    flex-direction: column;
    height: 100vh;
    overflow: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* ── Header ── */
  .header {
    flex: 0 0 auto;
    padding: 18px 26px;
    background: #fff;
    border-bottom: 1px solid var(--line);
    display: flex;
    align-items: center;
    gap: 16px;
  }
  .header h1 {
    font-size: 19px;
    font-weight: 700;
    letter-spacing: -0.02em;
    color: var(--ink);
    white-space: nowrap;
  }
  .header .sub { font-size: 12.5px; color: var(--faint); margin-top: 3px; white-space: nowrap; }
  .header .hbtn { margin-left: auto; }
  .header .search { position: relative; }
  .header .search input {
    width: 260px;
    padding: 11px 15px 11px 40px;
    border: 1px solid var(--line-2);
    border-radius: 12px;
    font-family: inherit;
    font-size: 13.5px;
    color: var(--ink);
    background: var(--surface);
    outline: none;
    transition: all .15s;
  }
  .header .search input::placeholder { color: var(--faint); }
  .header .search input:focus {
    border-color: var(--ink);
    background: #fff;
    box-shadow: 0 0 0 4px rgba(24,24,27,.06);
  }
  .header .search::before {
    content: '🔍';
    position: absolute;
    left: 13px; top: 50%;
    transform: translateY(-50%);
    font-size: 13px;
    opacity: .5;
  }

  /* ── Toolbar (랜덤 + 카테고리) ── */
  .toolbar {
    flex: 0 0 auto;
    display: flex; align-items: center; gap: 12px;
    padding: 14px 22px;
    background: #fff;
    border-bottom: 1px solid var(--line);
  }
  .rand {
    flex: 0 0 auto; border: none; cursor: pointer;
    background: var(--ink); color: #fff;
    font-family: inherit; font-weight: 600; font-size: 13px; letter-spacing: -0.01em;
    padding: 9px 15px; border-radius: 999px; white-space: nowrap;
    transition: transform .12s, background .15s;
  }
  .rand:hover { background: #000; }
  .rand:active { transform: scale(.95); }
  .rand.ghost { background: #fff; color: var(--ink); border: 1px solid var(--line-2); }
  .rand.ghost:hover { background: var(--surface); }

  /* 제보 폼 */
  .modal .form { padding: 24px 24px 26px; }
  .modal .form h2 { font-size: 21px; font-weight: 700; letter-spacing: -0.02em; }
  .modal .form .formsub { font-size: 13px; color: var(--muted); margin: 7px 0 18px; line-height: 1.5; }
  .modal .form label { display: block; font-size: 13px; font-weight: 600; color: var(--ink); margin: 14px 0 6px; }
  .modal .form label .req { color: #ef4444; }
  .modal .form label .opt { color: var(--faint); font-weight: 500; }
  .modal .form input, .modal .form textarea {
    width: 100%; font-family: inherit; font-size: 14px; color: var(--ink);
    padding: 11px 13px; border: 1px solid var(--line-2); border-radius: 11px;
    background: var(--surface); outline: none; transition: all .15s; resize: vertical;
  }
  .modal .form input:focus, .modal .form textarea:focus { border-color: var(--ink); background: #fff; box-shadow: 0 0 0 4px rgba(24,24,27,.06); }
  .modal .form .frow { display: flex; gap: 12px; }
  .modal .form .frow > div { flex: 1; }
  .modal .form .submitbtn {
    width: 100%; margin-top: 20px; padding: 14px; border: none; border-radius: 13px;
    background: var(--ink); color: #fff; font-family: inherit; font-weight: 600; font-size: 15px;
    cursor: pointer; transition: background .15s;
  }
  .modal .form .submitbtn:hover { background: #000; }
  .modal .form .formmsg { font-size: 13px; margin-top: 12px; text-align: center; line-height: 1.5; }
  .modal .form .formmsg.ok { color: #16a34a; font-weight: 600; }
  .modal .form .formmsg.err { color: #ef4444; font-weight: 600; }
  .filters {
    flex: 1 1 auto; min-width: 0;
    display: flex;
    gap: 8px;
    overflow-x: auto;
  }
  .filters::-webkit-scrollbar { display: none; }
  .chip {
    flex: 0 0 auto;
    padding: 8px 15px;
    border-radius: 999px;
    border: 1px solid var(--line-2);
    background: #fff;
    font-size: 13px;
    font-weight: 500;
    color: var(--muted);
    cursor: pointer;
    transition: all .15s;
    display: flex;
    align-items: center;
    gap: 7px;
    user-select: none;
    letter-spacing: -0.01em;
  }
  .chip .dot { width: 8px; height: 8px; border-radius: 50%; }
  .chip:hover { background: var(--surface); border-color: var(--line-2); }
  .chip.active { color: #fff; border-color: transparent; box-shadow: var(--shadow-sm); }
  .chip.active .dot { background: rgba(255,255,255,.85) !important; }

  /* ── Layout ── */
  .main { flex: 1 1 auto; display: flex; min-height: 0; position: relative; }
  .sidebar {
    flex: 0 0 344px;
    background: #fff;
    border-right: 1px solid var(--line);
    overflow-y: auto;
    padding: 16px;
    transition: flex-basis .22s ease;
  }
  /* 접힘 */
  .main.collapsed .sidebar { display: none; }

  /* 토글 FAB (하단 중앙) */
  .fab {
    position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%);
    z-index: 60; border: none; cursor: pointer;
    padding: 12px 22px; border-radius: 999px;
    background: var(--ink); color: #fff;
    font-family: inherit; font-weight: 600; font-size: 14px; letter-spacing: -0.01em;
    box-shadow: 0 8px 24px rgba(0,0,0,.28);
    display: flex; align-items: center; gap: 7px;
    transition: transform .12s, background .15s;
  }
  .fab:hover { background: #000; }
  .fab:active { transform: translateX(-50%) scale(.96); }
  .sidebar::-webkit-scrollbar { width: 8px; }
  .sidebar::-webkit-scrollbar-thumb { background: #e4e4e7; border-radius: 4px; }
  .sidebar .count { font-size: 12px; color: var(--faint); font-weight: 500; padding: 4px 8px 12px; }

  .card {
    border: 1px solid var(--line);
    border-radius: var(--radius);
    padding: 16px;
    margin-bottom: 12px;
    cursor: pointer;
    transition: transform .18s, box-shadow .18s, border-color .18s;
    background: #fff;
  }
  .card:hover { transform: translateY(-2px); box-shadow: var(--shadow); border-color: var(--line-2); }
  .card.active { border-color: var(--ink); box-shadow: var(--shadow); }
  .card .name { font-size: 15.5px; font-weight: 600; color: var(--ink); letter-spacing: -0.01em; line-height: 1.35; }
  .card .cats { display: flex; gap: 5px; flex-wrap: wrap; justify-content: flex-end; flex: 0 0 auto; max-width: 56%; }
  .card .cat {
    flex: 0 0 auto;
    font-size: 11px; font-weight: 600; letter-spacing: -0.01em;
    padding: 3px 9px; border-radius: 7px; color: #fff;
  }
  .popcard .c .star, .modal .body .badge { white-space: nowrap; }
  .card .thumb {
    width: 100%; height: 134px; border-radius: 12px; object-fit: cover;
    margin: 11px 0 3px; background: var(--surface); display: block;
  }
  .card .meta { font-size: 12.5px; color: var(--muted); margin-top: 9px; line-height: 1.65; }
  .card .tags { margin-top: 11px; display: flex; gap: 6px; flex-wrap: wrap; }
  .card .tag { font-size: 11px; color: var(--muted); background: var(--surface); padding: 3px 9px; border-radius: 7px; }

  #map { flex: 1 1 auto; min-width: 0; }

  /* ── Map markers (custom overlay) ── */
  /* 위치 정렬은 카카오 오버레이 앵커(xAnchor 0.5 / yAnchor 1)에 맡김. CSS transform 이동 금지 */
  .pin { position: relative; cursor: pointer; }
  .pin .body {
    background: #fff;
    border: 1px solid rgba(0,0,0,.05);
    border-radius: 999px;
    padding: 5px 12px 5px 8px;
    font-size: 12px;
    font-weight: 600;
    color: #27272a;
    letter-spacing: -0.01em;
    white-space: nowrap;
    box-shadow: 0 4px 14px rgba(0,0,0,.14), 0 1px 3px rgba(0,0,0,.08);
    display: flex; align-items: center; gap: 6px;
    transition: all .15s;
  }
  .pin .body .ico { width: 8px; height: 8px; border-radius: 50%; background: var(--c); display: inline-block; flex: 0 0 auto; }
  .pin::after {
    content: '';
    position: absolute; left: 50%; bottom: -6px;
    transform: translateX(-50%);
    border-left: 6px solid transparent;
    border-right: 6px solid transparent;
    border-top: 7px solid #fff;
    filter: drop-shadow(0 2px 1px rgba(0,0,0,.06));
  }
  .pin:hover .body { box-shadow: 0 6px 18px rgba(0,0,0,.2); }
  .pin.hi { z-index: 10; }
  .pin.hi .body { background: var(--ink); color: #fff; border-color: var(--ink); transform: scale(1.05); }
  .pin.hi .body .ico { background: #fff; }
  .pin.hi::after { border-top-color: var(--ink); }

  /* ── Map popup card (custom overlay) ── */
  .popcard {
    position: relative;
    transform: translateY(-46px);
    width: 320px;
    white-space: normal;
    word-break: break-word;
    overflow-wrap: anywhere;
    background: #fff;
    border: 1px solid rgba(0,0,0,.04);
    border-radius: 20px;
    box-shadow: 0 16px 48px rgba(0,0,0,.2), 0 3px 10px rgba(0,0,0,.08);
    padding: 20px 22px 22px;
    cursor: default;
    animation: popfade .16s ease;
  }
  @keyframes popfade { from { opacity: 0 } to { opacity: 1 } }
  .popcard::after {
    content: '';
    position: absolute; left: 50%; bottom: -10px;
    transform: translateX(-50%);
    border-left: 10px solid transparent;
    border-right: 10px solid transparent;
    border-top: 11px solid #fff;
    filter: drop-shadow(0 4px 2px rgba(0,0,0,.06));
  }
  .popcard .x {
    position: absolute; top: 14px; right: 14px;
    width: 28px; height: 28px; border-radius: 50%; border: none;
    background: #f4f4f5; color: #71717a; cursor: pointer; font-size: 14px;
    display: flex; align-items: center; justify-content: center;
    transition: background .15s;
  }
  .popcard .x:hover { background: #e7e7ea; }
  .popcard .n { font-size: 19px; font-weight: 700; color: var(--ink); letter-spacing: -0.02em; padding-right: 32px; }
  .popcard .c { font-size: 13px; color: var(--faint); margin: 7px 0 12px; }
  .popcard .c .star { color: #f59e0b; font-weight: 600; }
  .popcard .d { font-size: 14px; color: #3f3f46; line-height: 1.7; }
  .popcard .lk { margin-top: 18px; display: flex; gap: 10px; }
  .popcard .lk a {
    flex: 1; text-align: center; white-space: nowrap;
    font-size: 14px; font-weight: 600; text-decoration: none;
    padding: 12px; border-radius: 13px; transition: opacity .15s;
  }
  .popcard .lk a:hover { opacity: .88; }
  .popcard .lk a.m { color: var(--ink); background: #f4f4f5; }
  .popcard .lk a.w { color: #fff; background: var(--ink); }

  /* ── Banner ── */
  .banner {
    background: #fef2f2; border: 1px solid #fecaca; color: #b91c1c;
    padding: 14px 26px; margin: 0; font-size: 13px; line-height: 1.6;
    display: none;
  }
  .banner code { background: #fff; padding: 1px 6px; border-radius: 4px; font-size: 12px; }

  /* ── Detail modal ── */
  .modal {
    position: fixed; inset: 0; z-index: 100;
    background: rgba(24,24,27,.45);
    backdrop-filter: blur(3px);
    display: none; align-items: center; justify-content: center;
    padding: 24px;
  }
  .modal.open { display: flex; }
  .modal .box {
    background: #fff; border-radius: 22px; width: 100%; max-width: 540px;
    max-height: 88vh; overflow-y: auto; box-shadow: 0 24px 70px rgba(0,0,0,.28);
    animation: pop .2s cubic-bezier(.16,1,.3,1);
  }
  .modal .box::-webkit-scrollbar { width: 8px; }
  .modal .box::-webkit-scrollbar-thumb { background: #e4e4e7; border-radius: 4px; }
  @keyframes pop { from { transform: scale(.95) translateY(8px); opacity: 0 } to { transform: none; opacity: 1 } }
  .modal .x {
    position: sticky; top: 14px; float: right; margin: 14px 14px 0 0;
    width: 34px; height: 34px; border-radius: 50%; border: none;
    background: rgba(255,255,255,.92); cursor: pointer; font-size: 16px; color: #3f3f46;
    box-shadow: 0 2px 10px rgba(0,0,0,.15); z-index: 2;
    transition: background .15s;
  }
  .modal .x:hover { background: #f4f4f5; }
  .modal .gallery { display: flex; width: 100%; overflow-x: auto; scroll-snap-type: x mandatory; }
  .modal .gallery .slide { position: relative; flex: 0 0 100%; width: 100%; scroll-snap-align: start; }
  .modal .gallery .ph { display: block; width: 100%; height: 270px; object-fit: cover; cursor: zoom-in; background: var(--surface); }
  .modal .gallery .caplabel {
    position: absolute; left: 12px; top: 12px;
    background: rgba(24,24,27,.82); color: #fff; font-size: 12px; font-weight: 600;
    padding: 5px 11px; border-radius: 8px; letter-spacing: -0.01em;
  }
  .modal .gallery::-webkit-scrollbar { height: 6px; }
  .modal .gallery::-webkit-scrollbar-thumb { background: #d4d4d8; border-radius: 3px; }
  .modal .thumbs { display: flex; gap: 8px; padding: 12px 16px 0; overflow-x: auto; }
  .modal .thumbs::-webkit-scrollbar { display: none; }
  .modal .thumbs .th {
    width: 54px; height: 54px; flex: 0 0 auto; border-radius: 9px; object-fit: cover;
    cursor: pointer; border: 2px solid var(--line-2); transition: border-color .15s;
  }
  .modal .thumbs .th:hover { border-color: var(--ink); }
  .modal .thumbs .th.ismenu { border-color: #f59e0b; }
  .modal .nogallery {
    height: 130px; display: flex; align-items: center; justify-content: center;
    color: var(--faint); font-size: 13px; font-weight: 500;
    background: var(--surface);
  }
  .modal .body { padding: 22px 24px 26px; }
  .modal .body h2 { font-size: 22px; font-weight: 700; letter-spacing: -0.02em; color: var(--ink); }
  .modal .body .sub { font-size: 13px; color: var(--muted); margin: 8px 0 16px; display: flex; gap: 9px; flex-wrap: wrap; align-items: center; }
  .modal .body .badge { font-size: 11.5px; font-weight: 600; color: #fff; padding: 4px 10px; border-radius: 8px; letter-spacing: -0.01em; }
  .modal .body .row { font-size: 14px; color: #3f3f46; line-height: 1.7; margin: 5px 0; }
  .modal .body .row b { color: var(--ink); font-weight: 600; }
  .modal .body .tags { margin: 14px 0; display: flex; gap: 7px; flex-wrap: wrap; }
  .modal .body .tag { font-size: 12px; color: var(--muted); background: var(--surface); padding: 4px 11px; border-radius: 8px; }
  .modal .body .links { margin-top: 18px; display: flex; gap: 10px; }
  .modal .body .links a {
    flex: 1; text-align: center; text-decoration: none; font-weight: 600; font-size: 14px;
    padding: 13px; border-radius: 13px; transition: opacity .15s;
  }
  .modal .body .links a:hover { opacity: .88; }
  .modal .body .links a.m { color: var(--ink); background: #f4f4f5; }
  .modal .body .links a.w { color: #fff; background: var(--ink); }

  /* 댓글 */
  .modal .cmts { margin-top: 22px; border-top: 1px solid var(--line); padding-top: 18px; }
  .modal .cmts-h { font-size: 14px; font-weight: 700; color: var(--ink); margin-bottom: 12px; }
  .modal .cmts-h span { color: var(--faint); font-weight: 600; }
  .modal .cmt-list { display: flex; flex-direction: column; gap: 10px; margin-bottom: 14px; }
  .modal .cmt { background: var(--surface); border-radius: 12px; padding: 10px 13px; }
  .modal .cmt-nick { font-size: 12.5px; font-weight: 600; color: var(--ink); margin-bottom: 3px; }
  .modal .cmt-text { font-size: 13.5px; color: #3f3f46; line-height: 1.5; word-break: break-word; white-space: pre-wrap; }
  .modal .cmt-empty { font-size: 13px; color: var(--faint); padding: 6px 0; }
  .modal .cmt-form .c_nick {
    width: 130px; font-family: inherit; font-size: 13px; color: var(--ink);
    padding: 9px 12px; border: 1px solid var(--line-2); border-radius: 10px; background: var(--surface);
    outline: none; margin-bottom: 8px;
  }
  .modal .cmt-form .c_row { display: flex; gap: 8px; }
  .modal .cmt-form .c_text {
    flex: 1 1 auto; min-width: 0; font-family: inherit; font-size: 13px; color: var(--ink);
    padding: 9px 12px; border: 1px solid var(--line-2); border-radius: 10px; background: var(--surface); outline: none;
  }
  .modal .cmt-form .c_nick:focus, .modal .cmt-form .c_text:focus { border-color: var(--ink); background: #fff; }
  .modal .cmt-form .c_send {
    flex: 0 0 auto; border: none; cursor: pointer; background: var(--ink); color: #fff;
    font-family: inherit; font-weight: 600; font-size: 13px; padding: 0 16px; border-radius: 10px;
  }
  .modal .cmt-form .c_send:hover { background: #000; }

  @media (max-width: 720px) {
    .header { padding: 14px 16px; gap: 10px; }
    .toolbar { padding: 12px 14px; gap: 9px; }
    .rand { padding: 9px 13px; font-size: 12.5px; }
    .header .hbtn { padding: 8px 11px; font-size: 12.5px; }
    .header .search input { width: 120px; }
    /* 모바일: 목록은 지도를 덮는 전체화면 */
    .sidebar {
      position: absolute; inset: 0; z-index: 40;
      flex-basis: auto; width: 100%; border-right: none;
      padding: 14px 14px 88px;
    }
  }
</style>
</head>
<body>

<div class="header">
  <div>
    <h1>🍴 우리 회사 맛집지도</h1>
    <div class="sub">교대역 점심·회식 맛집 모음</div>
  </div>
  <button class="rand ghost hbtn" onclick="openSubmit()">✏️ 제보</button>
  <div class="search">
    <input id="q" type="text" placeholder="가게·메뉴 검색…" oninput="render()">
  </div>
</div>

<div class="banner" id="banner"></div>

<div class="toolbar">
  <button class="rand" onclick="randomPick()">🎲 오늘 뭐먹지?</button>
  <div class="filters" id="filters"></div>
</div>

<div class="main">
  <div class="sidebar">
    <div class="count" id="count"></div>
    <div id="list"></div>
  </div>
  <div id="map"></div>
</div>

<button class="fab" id="toggleBtn" onclick="toggleSidebar()">🗺 지도 크게보기</button>

<div class="modal" id="modal" onclick="if(event.target===this)closeDetail()">
  <div class="box">
    <button class="x" onclick="closeDetail()">✕</button>
    <div id="modalContent"></div>
  </div>
</div>

<div class="modal" id="submitModal" onclick="if(event.target===this)closeSubmit()">
  <div class="box">
    <button class="x" onclick="closeSubmit()">✕</button>
    <div class="form">
      <h2>✏️ 맛집 제보하기</h2>
      <p class="formsub">네이버 지도 링크만 있으면 돼요. 가게 이름·위치는 자동으로 채워집니다 🙂</p>
      <label>네이버 지도 링크 <span class="req">*</span></label>
      <input id="f_link" type="url" placeholder="https://naver.me/...">
      <label>한줄 메모</label>
      <textarea id="f_memo" rows="3" placeholder="예: 점심 웨이팅 짧음, 깍두기 맛집"></textarea>
      <div class="frow">
        <div>
          <label>평점 (1~5)</label>
          <input id="f_rating" type="number" min="1" max="5" step="0.5" placeholder="4.5">
        </div>
        <div>
          <label>제보자(닉네임) <span class="req">*</span></label>
          <input id="f_nick" type="text" placeholder="닉네임" maxlength="20">
        </div>
      </div>
      <label>대표사진 URL <span class="opt">(선택)</span></label>
      <input id="f_photo" type="url" placeholder="네이버 사진 우클릭 → 이미지 주소 복사">
      <label>메뉴판 URL <span class="opt">(선택)</span></label>
      <input id="f_menu" type="url" placeholder="메뉴판 사진 주소">
      <button class="submitbtn" onclick="submitTip()">제보 보내기</button>
      <div class="formmsg" id="formmsg"></div>
    </div>
  </div>
</div>

<script>
/* =========================================================================
   ① 맛집 데이터 — 여기만 채우면 됩니다.

let map, ps, geocoder, popup = null;

function colorOf(cat){ return (CATEGORIES[cat] && CATEGORIES[cat].color) || DEFAULT_COLOR; }
function labelOf(cat){ return (CATEGORIES[cat] && CATEGORIES[cat].label) || cat || '기타'; }
// cat 은 문자열 또는 배열(다중 카테고리) 둘 다 허용
function catsOf(p){ return Array.isArray(p.cat) ? p.cat.filter(Boolean) : (p.cat ? [p.cat] : []); }
function primaryColor(p){ return colorOf(catsOf(p)[0]); }
function catPills(p){ return catsOf(p).map(c => `<span class="cat" style="background:${colorOf(c)}">${labelOf(c)}</span>`).join(''); }

function showBanner(html){
  const b = document.getElementById('banner');
  b.innerHTML = '⚠️ ' + html;
  b.style.display = 'block';
}

function loadKakao(){
  if (!KAKAO_JS_KEY || KAKAO_JS_KEY.indexOf('여기에') === 0){
    showBanner('카카오 JavaScript 키가 아직 안 들어갔어요. 파일의 <code>KAKAO_JS_KEY</code> 값에 발급받은 키를 넣어주세요.');
    renderFilters(); render();      // 키 없어도 목록은 보이게
    return;
  }
  if (location.protocol === 'file:'){
    showBanner('이 파일을 PC에서 직접 연 것 같아요(file://). 카카오 지도는 file:// 에서 동작하지 않습니다. ' +
               '라이브 주소 <code>https://arlee165-cmd.github.io/rotation-dashboard/food-map.html</code> 로 열어주세요.');
    renderFilters(); render(); return;
  }
  const s = document.createElement('script');
  s.src = `https://dapi.kakao.com/v2/maps/sdk.js?appkey=${KAKAO_JS_KEY}&libraries=services&autoload=false`;
  s.onload = () => kakao.maps.load(initMap);
  s.onerror = () => showBanner('카카오 지도 SDK 로딩에 실패했어요. 카카오 콘솔에서 이 도메인(<code>' +
               location.origin + '</code>)이 <b>플랫폼 → Web → 사이트 도메인</b>에 등록됐는지 확인해주세요.');
  document.head.appendChild(s);
}

function initMap(){
  map = new kakao.maps.Map(document.getElementById('map'), {
    center: new kakao.maps.LatLng(CENTER.lat, CENTER.lng),
    level: 4,
  });
  ps = new kakao.maps.services.Places();
  kakao.maps.event.addListener(map, 'click', closePopup);

  // 길찾기 출발지(회사) 좌표를 미리 확보 (모바일 앱 길찾기에 사용)
  if (OFFICE && OFFICE.name){
    ps.keywordSearch(OFFICE.name, (data, status) => {
      if (status === kakao.maps.services.Status.OK && data.length){
        OFFICE.lat = parseFloat(data[0].y);
        OFFICE.lng = parseFloat(data[0].x);
      }
    }, { location: new kakao.maps.LatLng(CENTER.lat, CENTER.lng), radius: 2000, size: 1 });
  }

  geocoder = new kakao.maps.services.Geocoder();
  renderFilters();
  // 각 가게 좌표 확보 → 마커 생성 (주소 우선, 실패 시 이름 검색)
  let pending = PLACES.length;
  const tick = () => { if(--pending===0) finishLoad(); };
  PLACES.forEach((p, i) => locate(p, i, tick));
}

// 도로명 주소만 깔끔히 추출 (건물명/호수 제거) → 지오코딩 정확도↑
function roadOf(a){
  const t = (a||'').split(/\s+/);
  let ri = -1;
  for (let k=0;k<t.length;k++){ if(/[로길]\d*$/.test(t[k])){ ri=k; break; } }
  if (ri<0) return a;
  for (let k=ri+1;k<t.length;k++){ if(/^\d+(-\d+)?$/.test(t[k])) return t.slice(0,k+1).join(' '); }
  return t.slice(0,ri+1).join(' ');
}

function locate(p, i, done){
  if (typeof p.lat === 'number' && typeof p.lng === 'number'){ makeMarker(p,i); return done(); }
  if (p.addr){
    geocoder.addressSearch(roadOf(p.addr), (res, status) => {
      if (status === kakao.maps.services.Status.OK && res.length){
        p.lat = parseFloat(res[0].y); p.lng = parseFloat(res[0].x);
        if(!p._addr) p._addr = p.addr;
        makeMarker(p,i); return done();
      }
      keywordLocate(p,i,done);   // 주소 실패 시 이름으로
    });
    return;
  }
  keywordLocate(p,i,done);
}

function keywordLocate(p, i, done){
  const kw = p.keyword || p.name;
  ps.keywordSearch(kw, (data, status) => {
    if (status === kakao.maps.services.Status.OK && data.length){
      p.lat = parseFloat(data[0].y); p.lng = parseFloat(data[0].x);
      if(!p._addr) p._addr = data[0].road_address_name || data[0].address_name || '';
      if(!p.placeUrl) p.placeUrl = data[0].place_url;
      makeMarker(p, i);
    } else {
      p._notfound = true;
      console.warn('좌표 못 찾음:', kw);
    }
    done();
  }, { location: new kakao.maps.LatLng(CENTER.lat, CENTER.lng), radius: 3000, size: 1 });
}

function makeMarker(p, i){
  const c = primaryColor(p);
  const el = document.createElement('div');
  el.className = 'pin';
  el.style.setProperty('--c', c);
  el.innerHTML = `<div class="body"><span class="ico"></span>${p.name}</div>`;
  el.addEventListener('click', () => selectPlace(i));
  const overlay = new kakao.maps.CustomOverlay({
    position: new kakao.maps.LatLng(p.lat, p.lng),
    content: el, yAnchor: 1, zIndex: 5, clickable: true,
  });
  overlay.setMap(map);
  p._overlay = overlay;
  p._el = el;
}

function finishLoad(){ render(); }

// photos 항목을 {src, cap} 형태로 정규화 (문자열도 허용)
function photosOf(p){
  return (p.photos || [])
    .filter(Boolean)
    .map(x => typeof x === 'string' ? { src:x, cap:'' } : x)
    .filter(x => x && x.src);
}

function isMobile(){ return /Android|iPhone|iPad|iPod/i.test(navigator.userAgent); }

// ── 사이드바(목록) 접기/펼치기 + 상태 기억 ──
let collapsed = false;
function applyCollapsed(){
  const main = document.querySelector('.main');
  if (main) main.classList.toggle('collapsed', collapsed);
  const b = document.getElementById('toggleBtn');
  if (b) b.textContent = collapsed ? '📋 목록 보기' : '🗺 지도 크게보기';
  if (typeof map !== 'undefined' && map && map.relayout) setTimeout(() => map.relayout(), 230);
}
function setCollapsed(v, persist){
  collapsed = v;
  if (persist){ try { localStorage.setItem('fm_collapsed', v ? '1' : '0'); } catch(e){} }
  applyCollapsed();
}
function toggleSidebar(){ setCollapsed(!collapsed, true); }
function initSidebar(){
  let v = false;
  try { v = localStorage.getItem('fm_collapsed') === '1'; } catch(e){}
  setCollapsed(v, false);
}

// PC 웹: 도착지 지정 카카오맵 (출발지는 현재 위치)
function wayWebUrl(p){
  return `https://map.kakao.com/link/to/${encodeURIComponent(p.name)},${p.lat},${p.lng}`;
}

// 길찾기 클릭: 모바일이면 앱으로 열어 출발지(회사)·도착지 모두 세팅, PC면 웹 도착지 링크
function wayClick(i){
  const p = PLACES[i];
  if (!p.lat || !p.lng) return;
  if (isMobile() && OFFICE && OFFICE.lat){
    // kakaomap 앱 스킴: 출발지=회사, 도착지=가게 (대중교통)
    location.href = `kakaomap://route?sp=${OFFICE.lat},${OFFICE.lng}&ep=${p.lat},${p.lng}&by=PUBLICTRANSIT`;
    // 앱이 없으면 웹으로 폴백
    setTimeout(() => window.open(wayWebUrl(p), '_blank'), 700);
    return;
  }
  window.open(wayWebUrl(p), '_blank');
}

function closePopup(){ if (popup){ popup.setMap(null); popup = null; } }
function nl2br(s){ return (s || '').replace(/\n/g, '<br>'); }
function galTo(i){ const g = document.getElementById('gal'); if (g) g.scrollTo({ left: i * g.clientWidth, behavior: 'smooth' }); }

// 🎲 오늘 뭐먹지 — 현재 켜둔 카테고리/검색 범위 안에서 랜덤 추천
function randomPick(){
  const items = visiblePlaces().filter(({p}) => p.lat && p.lng);
  if (!items.length){ alert('조건에 맞는 맛집이 없어요. 카테고리를 켜보세요!'); return; }
  const pick = items[Math.floor(Math.random() * items.length)];
  selectPlace(pick.i);
}

function openInfo(p, i){
  const hasLoc = p.lat && p.lng;
  const el = document.createElement('div');
  el.className = 'popcard';
  el.innerHTML = `
    <button class="x" onclick="closePopup()">✕</button>
    <div class="n">${p.name}</div>
    <div class="c">${catsOf(p).map(labelOf).join(' · ')}${p.price ? ' · '+p.price : ''}${p.rating ? ' · <span class="star">⭐ '+p.rating+'</span>' : ''}</div>
    <div class="d">${[p.menu, nl2br(p.note), p._addr].filter(Boolean).join('<br>') || '맛집 정보를 채워주세요'}</div>
    <div class="lk">
      <a class="m" href="javascript:void(0)" onclick="openDetail(${i})">📷 사진·상세</a>
      ${hasLoc ? `<a class="w" href="javascript:void(0)" onclick="wayClick(${i})">길찾기</a>` : ''}
    </div>`;
  closePopup();
  popup = new kakao.maps.CustomOverlay({
    position: new kakao.maps.LatLng(p.lat, p.lng),
    content: el, yAnchor: 1, zIndex: 30, clickable: true,
  });
  popup.setMap(map);
}

function openDetail(i){
  const p = PLACES[i];
  const photos = photosOf(p);
  const map_url = (p.lat && p.lng) ? `https://map.kakao.com/link/map/${encodeURIComponent(p.name)},${p.lat},${p.lng}` : null;
  const hasLoc = p.lat && p.lng;

  const gallery = photos.length
    ? `<div class="gallery" id="gal">${photos.map(ph =>
        `<div class="slide"><img class="ph" src="${ph.src}" alt="${ph.cap||p.name}" onclick="window.open(this.src,'_blank')" onerror="this.parentNode.style.display='none'">${ph.cap ? `<span class="caplabel">📋 ${ph.cap}</span>` : ''}</div>`).join('')}</div>
       ${photos.length>1 ? `<div class="thumbs">${photos.map((ph,gi) => `<img class="th ${ph.cap?'ismenu':''}" src="${ph.src}" title="${ph.cap||'사진'}" onclick="galTo(${gi})">`).join('')}</div>` : ''}`
    : `<div class="nogallery">🍽 사진이 아직 없어요</div>`;

  document.getElementById('modalContent').innerHTML = `
    ${gallery}
    <div class="body">
      <h2>${p.name}</h2>
      <div class="sub">
        ${catsOf(p).map(cc => `<span class="badge" style="background:${colorOf(cc)}">${labelOf(cc)}</span>`).join('')}
        ${p.price ? '<span>'+p.price+'</span>' : ''}
        ${p.rating ? '<span style="color:#f59e0b;font-weight:600">⭐ '+p.rating+'</span>' : ''}
        ${p.by ? '<span>🙋 '+esc(p.by)+'</span>' : ''}
      </div>
      ${p.menu ? `<div class="row"><b>🍽 메뉴</b> · ${p.menu}</div>` : ''}
      ${p.note ? `<div class="row"><b>📝 메모</b> · ${nl2br(p.note)}</div>` : ''}
      ${p._addr ? `<div class="row"><b>📍 주소</b> · ${p._addr}</div>` : ''}
      ${(p.tags&&p.tags.length) ? `<div class="tags">${p.tags.map(t=>`<span class="tag">#${t}</span>`).join('')}</div>` : ''}
      ${(map_url||hasLoc) ? `<div class="links">
        ${map_url ? `<a class="m" href="${p.placeUrl||map_url}" target="_blank">카카오맵에서 보기</a>` : ''}
        ${hasLoc ? `<a class="w" href="javascript:void(0)" onclick="wayClick(${i})">길찾기</a>` : ''}
      </div>` : ''}
      <div class="cmts">
        <div class="cmts-h">💬 댓글 <span id="cmtcount"></span></div>
        <div class="cmt-list" id="cmtList"></div>
        <div class="cmt-form">
          <input id="c_nick" class="c_nick" placeholder="닉네임 *" maxlength="20">
          <div class="c_row">
            <input id="c_text" class="c_text" placeholder="댓글 남기기…" maxlength="200"
                   onkeydown="if(event.key==='Enter')submitComment('${p.id}')">
            <button class="c_send" onclick="submitComment('${p.id}')">등록</button>
          </div>
        </div>
      </div>
    </div>`;
  currentDetailId = String(p.id);
  try { const nk = localStorage.getItem('fm_nick'); if (nk) document.getElementById('c_nick').value = nk; } catch(e){}
  renderComments(currentDetailId);
  document.getElementById('modal').classList.add('open');
}
function closeDetail(){ document.getElementById('modal').classList.remove('open'); currentDetailId = null; }

// ── 맛집 제보 폼 ──
function openSubmit(){ document.getElementById('submitModal').classList.add('open'); }
function closeSubmit(){ document.getElementById('submitModal').classList.remove('open'); }
function fval(id){ return (document.getElementById(id).value || '').trim(); }
function submitTip(){
  const msg = document.getElementById('formmsg');
  const link = fval('f_link');
  const nick = fval('f_nick');
  if (!/^https?:\/\//.test(link)){ msg.textContent = '네이버 지도 링크를 넣어주세요.'; msg.className = 'formmsg err'; return; }
  if (!nick){ msg.textContent = '닉네임을 입력해주세요. (필수)'; msg.className = 'formmsg err'; return; }
  if (!SUBMIT_URL){ msg.textContent = '⚠️ 제보 받기가 아직 설정 전이에요. (관리자가 SUBMIT_URL 설정 필요)'; msg.className = 'formmsg err'; return; }
  try { localStorage.setItem('fm_nick', nick); } catch(e){}
  const payload = { type: 'tip', link, memo: fval('f_memo'), rating: fval('f_rating'), photo: fval('f_photo'), menu: fval('f_menu'), nick };
  msg.textContent = '보내는 중…'; msg.className = 'formmsg';
  const done = () => {
    msg.textContent = '✅ 제보 감사합니다! 검토 후 지도에 추가할게요.'; msg.className = 'formmsg ok';
    ['f_link','f_memo','f_rating','f_photo','f_menu'].forEach(id => document.getElementById(id).value = '');
  };
  fetch(SUBMIT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain;charset=utf-8' }, body: JSON.stringify(payload) })
    .then(done).catch(done);
}
// ── 댓글 ──
function esc(s){ return (s == null ? '' : String(s)).replace(/[&<>"']/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[m])); }

function renderComments(id){
  const list = document.getElementById('cmtList');
  if (!list) return;
  const arr = COMMENTS[String(id)] || [];
  const cnt = document.getElementById('cmtcount');
  if (cnt) cnt.textContent = arr.length ? arr.length : '';
  list.innerHTML = arr.length
    ? arr.map(c => `<div class="cmt"><div class="cmt-nick">${esc(c.nick)||'익명'}</div><div class="cmt-text">${esc(c.text)}</div></div>`).join('')
    : `<div class="cmt-empty">아직 댓글이 없어요. 첫 댓글을 남겨보세요!</div>`;
}

function submitComment(id){
  const nick = fval('c_nick'), text = fval('c_text');
  if (!nick){ alert('닉네임을 입력해주세요. (필수)'); return; }
  if (!text){ alert('댓글 내용을 입력해주세요.'); return; }
  if (!SUBMIT_URL){ alert('댓글 기능이 아직 설정 전이에요.'); return; }
  try { localStorage.setItem('fm_nick', nick); } catch(e){}
  const k = String(id);
  (COMMENTS[k] = COMMENTS[k] || []).push({ nick, text });   // 낙관적 표시
  renderComments(k);
  document.getElementById('c_text').value = '';
  fetch(SUBMIT_URL, { method: 'POST', mode: 'no-cors', headers: { 'Content-Type': 'text/plain;charset=utf-8' },
    body: JSON.stringify({ type: 'comment', placeId: k, nick, text }) }).catch(()=>{});
}

function loadComments(){
  if (!SUBMIT_URL) return;
  const cb = 'cmtcb_' + Date.now();
  window[cb] = (arr) => {
    const map = {};
    (arr || []).forEach(c => { const k = String(c.placeId); (map[k] = map[k] || []).push(c); });
    COMMENTS = map;
    if (currentDetailId) renderComments(currentDetailId);
    try { delete window[cb]; } catch(e){}
  };
  const s = document.createElement('script');
  s.src = SUBMIT_URL + '?callback=' + cb + '&_=' + Date.now();
  s.onerror = () => { try { delete window[cb]; } catch(e){} };
  document.body.appendChild(s);
}

document.addEventListener('keydown', e => { if(e.key==='Escape'){ closeDetail(); closeSubmit(); } });

function selectPlace(i){
  activeIdx = i;
  const p = PLACES[i];
  // 모바일: 목록이 지도를 덮고 있으면 닫고 지도로 전환 (저장은 안 함)
  const justOpenedMap = isMobile() && !collapsed;
  if (justOpenedMap) setCollapsed(true, false);
  const show = () => {
    if (map && p.lat){ map.panTo(new kakao.maps.LatLng(p.lat, p.lng)); openInfo(p, i); }
  };
  if (justOpenedMap) setTimeout(show, 260); else show();
  // 핀 강조
  PLACES.forEach(q => q._el && q._el.classList.remove('hi'));
  if (p._el) p._el.classList.add('hi');
  render();
  // 사이드바 카드로 스크롤
  const card = document.querySelector(`.card[data-i="${i}"]`);
  if (card) card.scrollIntoView({ block:'nearest', behavior:'smooth' });
}

function renderFilters(){
  const box = document.getElementById('filters');
  box.innerHTML = '';
  // 전체
  const all = document.createElement('div');
  const allActive = activeCats.size === Object.keys(CATEGORIES).length;
  all.className = 'chip' + (allActive ? ' active':'');
  if (allActive) all.style.background = '#18181b';
  all.textContent = '전체';
  all.onclick = () => {
    if (activeCats.size === Object.keys(CATEGORIES).length) activeCats.clear();
    else Object.keys(CATEGORIES).forEach(k => activeCats.add(k));
    syncOverlays(); renderFilters(); render();
  };
  box.appendChild(all);

  Object.entries(CATEGORIES).forEach(([k, v]) => {
    const chip = document.createElement('div');
    const on = activeCats.has(k);
    chip.className = 'chip' + (on ? ' active':'');
    if (on) chip.style.background = v.color;
    chip.innerHTML = `<span class="dot" style="background:${v.color}"></span>${v.label}`;
    chip.onclick = () => {
      if (activeCats.has(k)) activeCats.delete(k); else activeCats.add(k);
      syncOverlays(); renderFilters(); render();
    };
    box.appendChild(chip);
  });
}

function syncOverlays(){
  PLACES.forEach(p => {
    if (!p._overlay) return;
    const on = catsOf(p).some(c => activeCats.has(c));
    p._overlay.setMap(on ? map : null);
  });
}

function visiblePlaces(){
  const q = (document.getElementById('q').value || '').trim().toLowerCase();
  return PLACES
    .map((p,i)=>({p,i}))
    .filter(({p}) => catsOf(p).some(c => activeCats.has(c)))
    .filter(({p}) => {
      if (!q) return true;
      return [p.name, p.menu, p.note, (p.tags||[]).join(' '), catsOf(p).map(labelOf).join(' ')]
        .filter(Boolean).join(' ').toLowerCase().includes(q);
    });
}

function render(){
  const list = document.getElementById('list');
  const items = visiblePlaces();
  document.getElementById('count').textContent = `${items.length}곳`;
  list.innerHTML = items.map(({p,i}) => {
    const ph = photosOf(p);
    return `<div class="card ${i===activeIdx?'active':''}" data-i="${i}" onclick="selectPlace(${i})">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;gap:10px">
        <div class="name">${p.name}${p._notfound?' <span style="color:#ef4444;font-size:11px;font-weight:500">(위치 못 찾음)</span>':''}</div>
        <div class="cats">${catPills(p)}</div>
      </div>
      ${ph.length ? `<img class="thumb" src="${ph[0].src}" alt="${p.name}"
            onclick="event.stopPropagation();openDetail(${i})"
            onerror="this.style.display='none'">` : ''}
      <div class="meta">
        ${p.menu ? '🍽 '+p.menu+'<br>':''}
        ${p.price ? '💰 '+p.price+'&nbsp;&nbsp;':''}${p.rating ? '⭐ '+p.rating:''}
        ${p.note ? '<br>📝 '+nl2br(p.note):''}
      </div>
      ${(p.tags&&p.tags.length)?`<div class="tags">${p.tags.map(t=>`<span class="tag">#${t}</span>`).join('')}</div>`:''}
    </div>`;
  }).join('') || '<div style="padding:24px;text-align:center;color:#a1a1aa;font-size:13px">결과가 없어요</div>';
}

initSidebar();
loadComments();
loadKakao();
</script>
</body>
</html>
